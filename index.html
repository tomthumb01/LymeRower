  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

spacing:0.09em;color:#6B7A90;text-transform:uppercase;margin-bottom:14px;\">Flag Maintenance to Boatman<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px;\">\n              <div onclick=\"{{ toggleFlagPin }}\" style=\"display:flex;align-items:center;gap:11px;border:1px solid #ECEFF3;border-radius:10px;padding:11px 13px;cursor:pointer;transition:border-color .15s,background .15s;\" style-hover=\"border-color:#D6DEE7;background:#FBFCFD;\">\n                <span style=\"width:19px;height:19px;border-radius:6px;flex:none;position:relative;overflow:hidden;border:1.5px solid #C7D0DB;\"><sc-if value=\"{{ fPin }}\"><span style=\"position:absolute;inset:-1.5px;background:#12304B;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;\">✓<\u002Fspan><\u002Fsc-if><\u002Fspan>\n                <span style=\"font-size:13px;color:#3A4757;flex:1;\">Loose pin — seat 3<\u002Fspan>\n              <\u002Fdiv>\n              <div onclick=\"{{ toggleFlagStretcher }}\" style=\"display:flex;align-items:center;gap:11px;border:1px solid #ECEFF3;border-radius:10px;padding:11px 13px;cursor:pointer;transition:border-color .15s,background .15s;\" style-hover=\"border-color:#D6DEE7;background:#FBFCFD;\">\n                <span style=\"width:19px;height:19px;border-radius:6px;flex:none;position:relative;overflow:hidden;border:1.5px solid #C7D0DB;\"><sc-if value=\"{{ fStretcher }}\"><span style=\"position:absolute;inset:-1.5px;background:#12304B;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;\">✓<\u002Fspan><\u002Fsc-if><\u002Fspan>\n                <span style=\"font-size:13px;color:#3A4757;flex:1;\">Damaged stretcher<\u002Fspan>\n              <\u002Fdiv>\n              <div onclick=\"{{ toggleFlagOther }}\" style=\"display:flex;align-items:center;gap:11px;border:1px solid #ECEFF3;border-radius:10px;padding:11px 13px;cursor:pointer;transition:border-color .15s,background .15s;\" style-hover=\"border-color:#D6DEE7;background:#FBFCFD;\">\n                <span style=\"width:19px;height:19px;border-radius:6px;flex:none;position:relative;overflow:hidden;border:1.5px solid #C7D0DB;\"><sc-if value=\"{{ fOther }}\"><span style=\"position:absolute;inset:-1.5px;background:#12304B;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;\">✓<\u002Fspan><\u002Fsc-if><\u002Fspan>\n                <span style=\"font-size:13px;color:#3A4757;flex:1;\">Other…<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <button style=\"font-family:'Hanken Grotesk',sans-serif;margin-top:14px;background:#E5564B;color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border:none;border-radius:10px;cursor:pointer;box-shadow:0 10px 20px -10px rgba(229,86,75,0.6);transition:transform .15s;\" style-hover=\"transform:translateY(-2px);\" style-active=\"transform:scale(.98);\">Send flag<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E4E9EF;border-radius:18px;padding:22px;box-shadow:0 1px 2px rgba(16,34,53,0.04);\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:0.09em;color:#6B7A90;text-transform:uppercase;margin-bottom:14px;\">Upload GPS Telemetry<\u002Fdiv>\n            <div style=\"border:1.5px dashed #C7D0DB;border-radius:12px;padding:22px;text-align:center;color:#9AA6B4;font-size:12.5px;transition:border-color .2s,background .2s;\" style-hover=\"border-color:#0FB5A3;background:#F5FBFA;\"><div style=\"font-size:22px;margin-bottom:6px;\">↑<\u002Fdiv>Drop CSV / GPX / FIT from Stroke Coach<div style=\"font-size:11px;margin-top:5px;color:#B6BFCB;\">Nielsen-Kellerman · CrewNerd<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- COX CARD -->\n    <sc-if value=\"{{ sCard }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;\">\n        <div>\n          <h1 style=\"margin:0;font-family:'Space Grotesk',sans-serif;font-size:27px;font-weight:700;color:#12233A;letter-spacing:-0.01em;\">Cox Card &amp; Live Session<\u002Fh1>\n          <div style=\"margin-top:4px;font-size:13.5px;color:#8A97A8;\">{{ crewName }} · tied to the selected session · pre-print, or run it live on your phone<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ printCard }}\" style=\"font-family:'Hanken Grotesk',sans-serif;background:#12304B;color:#fff;font-size:13.5px;font-weight:600;padding:11px 18px;border:none;border-radius:11px;cursor:pointer;box-shadow:0 10px 22px -10px rgba(18,48,75,0.55);transition:transform .15s ease;\" style-hover=\"transform:translateY(-2px);\" style-active=\"transform:scale(.98);\">⎙ Print card<\u002Fbutton>\n      <\u002Fdiv>\n      {{ coxCardScreen }}\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- RESULTS -->\n    <sc-if value=\"{{ sResults }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;\">\n        <div>\n          <h1 style=\"margin:0;font-family:'Space Grotesk',sans-serif;font-size:27px;font-weight:700;color:#12233A;letter-spacing:-0.01em;\">Results &amp; Analytics<\u002Fh1>\n          <div style=\"margin-top:4px;font-size:13.5px;color:#8A97A8;\">{{ crewName }} · longitudinal performance tracking from logged sessions<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      {{ resultsScreen }}\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ADMIN -->\n    <sc-if value=\"{{ sAdmin }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:6px;\">\n        <span style=\"font-size:11px;font-weight:700;letter-spacing:0.12em;color:#9AA6B4;text-transform:uppercase;border:1px dashed #C2CCD8;border-radius:7px;padding:4px 10px;\">Admin area<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;\">\n        <div>\n          <h1 style=\"margin:0;font-family:'Space Grotesk',sans-serif;font-size:27px;font-weight:700;color:#12233A;letter-spacing:-0.01em;\">Club Admin<\u002Fh1>\n          <div style=\"margin-top:4px;font-size:13.5px;color:#8A97A8;\">Manage crews, the boat fleet and member accounts<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:22px;\">\n        {{ pendingPanel }}\n        {{ crewsAdmin }}\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;\">\n          {{ boatsPanel }}\n          {{ membersPanel }}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'dashboard',\n    crewId: 'bteam',\n    role: 'coach',\n    crewMenuOpen: false,\n    counts: { att: 0, sess: 0, flags: 0 },\n    rpe: 7,\n    flags: { pin: true, stretcher: false, other: false },\n    schedules: {},\n    crews: [],\n    boats: [],\n    members: [],\n    libType: 'all',\n    libPhase: 'all',\n    ergView: 'team',\n    plPhase: 'all',\n    plType: 'all',\n    assignFor: null,\n    focusKey: null,\n    liveOn: false,\n    liveElapsed: 0,\n    capture: { timing: 3 },\n    resRower: 'Team',\n    resRange: 'all',\n    authState: 'loading',\n    authMode: 'login',\n    authError: '',\n    user: null,\n    pendingUsers: [],\n    dataReady: false\n  };\n\n  componentDidMount() {\n    window.addEventListener('unhandledrejection', e => { window.__rej = (e.reason && (e.reason.stack || e.reason.code || e.reason.message)) || JSON.stringify(e.reason); });\n    this.initFirebase();\n  }\n  async initFirebase() {\n    try {\n      const V = 'https://www.gstatic.com/firebasejs/10.12.2/';\n      const [appMod, authMod, dbMod] = await Promise.all([import(V + 'firebase-app.js'), import(V + 'firebase-auth.js'), import(V + 'firebase-database.js')]);\n      const app = appMod.initializeApp(window.FIREBASE_CONFIG);\n      this._auth = authMod.getAuth(app);\n      this._db = dbMod.getDatabase(app);\n      this._fa = authMod; this._fd = dbMod;\n      authMod.onAuthStateChanged(this._auth, u => this.onAuth(u));\n    } catch (e) { this.setState({ authState: 'signedout', authError: 'Could not load Firebase: ' + (e && (e.message || e)) }); }\n  }\n  componentDidUpdate(pp, ps) {\n    if (this.state.authState === 'ready' && (ps.crews !== this.state.crews || ps.members !== this.state.members || ps.boats !== this.state.boats || ps.schedules !== this.state.schedules)) this.persistSoon();\n  }\n  componentWillUnmount() { if (this._timer) clearInterval(this._timer); if (this._pt) clearTimeout(this._pt); }\n\n  // ---------- Firebase / auth (modular SDK) ----------\n  onAuth(user) {\n    if (!user) { this.setState({ authState: 'signedout', user: null }); return; }\n    const { ref, get, set } = this._fd; const db = this._db;\n    get(ref(db, 'users/' + user.uid)).then(snap => {\n      if (snap.exists()) { this.afterUserDoc(user, snap.val()); }\n      else {\n        get(ref(db, 'meta/claimed')).then(cs => {\n          const first = !cs.exists();\n          const data = { email: user.email || '', name: this._pendingName || (user.email || '').split('@')[0], role: first ? 'coach' : 'member', status: first ? 'active' : 'pending', createdAt: Date.now() };\n          set(ref(db, 'users/' + user.uid), data).then(() => { if (first) set(ref(db, 'meta/claimed'), true); this.afterUserDoc(user, data); }).catch(err => this.setState({ authError: this.authMsg(err) }));\n        });\n      }\n    }).catch(err => this.setState({ authState: 'signedout', authError: this.authMsg(err) }));\n  }\n  afterUserDoc(user, data) {\n    this.setState({ user: { uid: user.uid, email: user.email, name: data.name, role: data.role, status: data.status } });\n    if (data.status === 'active') { this.loadClub().then(() => { this.setState({ authState: 'ready', role: data.role || 'coach' }); if (data.role === 'coach') { this.subscribePending(); try { this._fd.set(this._fd.ref(this._db, 'meta/claimed'), true); } catch (e) {} } }); }\n    else { this.setState({ authState: 'pending' }); }\n  }\n  subscribePending() {\n    if (this._pendingSub) return;\n    const { ref, onValue } = this._fd;\n    this._pendingSub = onValue(ref(this._db, 'users'), snap => {\n      const v = snap.val() || {};\n      const pend = Object.keys(v).map(uid => ({ uid, ...v[uid] })).filter(u => u.status === 'pending');\n      this.setState({ pendingUsers: pend });\n    });\n  }\n  approveUser(u) {\n    const { ref, set } = this._fd;\n    set(ref(this._db, 'users/' + u.uid + '/status'), 'active').catch(() => {});\n    this.setState(s => {\n      const exists = s.members.some(m => (m.email && m.email === u.email) || m.n === u.name);\n      const members = exists ? s.members : [...s.members, { n: u.name || (u.email || '').split('@')[0], role: 'Rower', crew: 'Unassigned', email: u.email || '' }];\n      return { members };\n    });\n  }\n  declineUser(u) { const { ref, remove } = this._fd; remove(ref(this._db, 'users/' + u.uid)).catch(() => {}); }\n  renderPending() {\n    const h = React.createElement;\n    if (this.state.role !== 'coach') return null;\n    const list = this.state.pendingUsers || [];\n    if (!list.length) return null;\n    return h('div', { style: { background: '#FFF7E8', border: '1px solid #F2E0B8', borderRadius: '18px', padding: '20px 22px', boxShadow: '0 1px 2px rgba(16,34,53,.04)' } },\n      h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '14px' } },\n        h('span', { style: { fontSize: '11px', fontWeight: 700, letterSpacing: '.09em', color: '#B7791F', textTransform: 'uppercase' } }, 'Pending approvals'),\n        h('span', { style: { background: '#E0A21
